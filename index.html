<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜덤 회차 뽑기</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
    }

    .container {
      width: 350px;
      margin: 0 auto;
      padding: 30px;
      border: 1px solid #ccc;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input {
      width: 80%;
      padding: 10px;
      font-size: 16px;
      margin-top: 15px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 25px;
      font-size: 20px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>오늘의 회차 뽑기</h1>
    <p>최신 회차 또는 현재 진도를 입력하세요.</p>
    <input type="number" id="maxNumber" placeholder="예: 30" min="1">
    <br>
    <button onclick="pickRandom()">뽑기</button>
    <div id="result"></div>
  </div>

  <script>
    function pickRandom() {
      const max = parseInt(document.getElementById("maxNumber").value);
      const resultDiv = document.getElementById("result");

      if (isNaN(max) || max < 1) {
        resultDiv.textContent = "1 이상의 숫자를 입력하세요.";
        return;
      }

      const randomNumber = Math.floor(Math.random() * max) + 1;
      resultDiv.textContent = `오늘 플래너에 적을 회차는: ${randomNumber} 입니다.`;
    }
  </script>
</body>
</html>
